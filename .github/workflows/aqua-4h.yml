name: aqua-4h-btcusd

on:
  workflow_dispatch:
  schedule:
    # Pre-warm 35 minutes before Nigeria/WAT 4H candle opens.
    # GitHub-hosted runners are not real-time; starting early gives the job
    # enough room to install/load, then the Python runner waits for candle open.
    # WAT candle opens: 01:00, 05:00, 09:00, 13:00, 17:00, 21:00.
    # UTC cron starts: 23:25, 03:25, 07:25, 11:25, 15:25, 19:25.
    - cron: "25 23,3,7,11,15,19 * * *"

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-aqua-4h-github.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run 4H trader
        env:
          AQUA_MT5_LOGIN: ${{ secrets.AQUA_MT5_LOGIN }}
          AQUA_MT5_PASSWORD: ${{ secrets.AQUA_MT5_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AQUA_INITIAL_BALANCE: "100000"
          AQUA_PAYOUT_DAYS: "14"
          AQUA_PREWARM: "1"
          AQUA_PREWARM_MAX_MINUTES: "75"
          AQUA_CLOSE_LEAD_SECONDS: "20"
          AQUA_OPEN_DELAY_SECONDS: "5"
        run: python aqua_4h_github_runner.py

      - name: Persist agent state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aqua-4h-agent-state.json
          git diff --cached --quiet || git commit -m "Update Aqua 4H agent state"
          git push
